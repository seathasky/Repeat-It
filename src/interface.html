<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repeat It</title>
  <script>
    const QUICK_DEVICES = __REPEAT_IT_QUICK_DEVICE_NAMES__;
    const DROPDOWN_DEVICES = __REPEAT_IT_DROPDOWN_DEVICE_NAMES__;
    const SELECTED_DROPDOWN_DEVICE = __REPEAT_IT_SELECTED_DROPDOWN_DEVICE__;
    const SELECTED_INSERT_POSITION = __REPEAT_IT_SELECTED_INSERT_POSITION__;
    const SELECTED_TRACK_SCOPE = __REPEAT_IT_SELECTED_TRACK_SCOPE__;
    const SELECTED_TRACK_COUNT = __REPEAT_IT_SELECTED_TRACK_COUNT__;
    const AUTO_UPDATE_CHECK = __REPEAT_IT_AUTO_UPDATE_CHECK__;
    const USER_OPTIONS = __REPEAT_IT_USER_OPTIONS__;
    const ACTIVE_DEVICES = new Set(__REPEAT_IT_ACTIVE_DEVICE_NAMES__);
    const VERSION = __REPEAT_IT_VERSION__;
    const UPDATE_CHECK_URL = __REPEAT_IT_UPDATE_CHECK_URL__;
    const RELEASES_URL = __REPEAT_IT_RELEASES_URL__;

    const isWebKitMessageHandlerAvailable = window.webkit &&
      window.webkit.messageHandlers &&
      window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;

    function sendMessage(message) {
      if (isWebKitMessageHandlerAvailable) {
        window.webkit.messageHandlers.live.postMessage(message);
      } else if (isWebView2) {
        window.chrome.webview.postMessage(message);
      }
    }

    function getUserOptions() {
      return {
        isDarkModeEnabled,
        areTooltipsEnabled,
      };
    }

    function closeWithResult(result) {
      sendMessage({
        method: "close_and_send",
        params: [JSON.stringify({ ...result, userOptions: getUserOptions() })],
      });
    }

    function closeRepeatIt() {
      closeWithResult({
        action: "close",
        insertPosition: selectedInsertPosition,
        trackScope: selectedTrackScope,
      });
    }

    function applyOptions() {
      document.body.classList.toggle("light-mode", !isDarkModeEnabled);
      document.body.classList.toggle("tooltips-enabled", areTooltipsEnabled);
    }

    function openOptions() {
      isOptionsOpen = true;
      document.body.classList.add("options-open");
    }

    function closeOptions() {
      isOptionsOpen = false;
      document.body.classList.remove("options-open");
    }


    let latestReleaseUrl = RELEASES_URL;
    let pendingAction = null;
    let isOptionsOpen = false;
    let isDarkModeEnabled = USER_OPTIONS && USER_OPTIONS.isDarkModeEnabled === false
      ? false
      : true;
    let areTooltipsEnabled = USER_OPTIONS && USER_OPTIONS.areTooltipsEnabled === false
      ? false
      : true;
    let selectedInsertPosition = SELECTED_INSERT_POSITION === "start" ? "start" : "end";
    let selectedTrackScope = SELECTED_TRACK_SCOPE === "selected" && SELECTED_TRACK_COUNT > 0
      ? "selected"
      : "all";
    let selectedDevice = DROPDOWN_DEVICES.includes(SELECTED_DROPDOWN_DEVICE)
      ? SELECTED_DROPDOWN_DEVICE
      : QUICK_DEVICES[0];

    const UNSUPPORTED_DROPDOWN_DEVICES = new Set([
      "Align Delay",
      "Shaper",
      "LFO",
      "Envelope Follower",
    ]);

    function confirmAction(action, deviceName) {
      pendingAction = {
        action,
        deviceName,
        insertPosition: selectedInsertPosition,
        trackScope: selectedTrackScope,
      };

      document.getElementById("confirm-title").textContent = action === "add"
        ? `Add ${deviceName}?`
        : `Delete all ${deviceName}?`;
      document.getElementById("confirm-copy").textContent = action === "add"
        ? `This will add ${deviceName} to the ${selectedInsertPosition === "start" ? "start" : "end"} of ${getTrackScopeCopy()}.`
        : `This will delete every ${deviceName} from ${getTrackScopeCopy()}.`;
      document.getElementById("confirm-yes").textContent = action === "add"
        ? "Add to all"
        : "Delete all";
      document.getElementById("confirm-yes").className = action === "add"
        ? "confirm-button"
        : "confirm-button danger";
      document.getElementById("confirm-panel").hidden = false;
    }

    function confirmRemoveAllAbletonFX() {
      pendingAction = {
        action: "removeAll",
        confirmed: false,
        insertPosition: selectedInsertPosition,
        trackScope: selectedTrackScope,
      };
      document.getElementById("confirm-title").textContent = "REMOVE ALL ABLETON FX?";
      document.getElementById("confirm-copy").textContent =
        `This will delete every supported Ableton audio effect from ${getTrackScopeCopy()}.`;
      document.getElementById("confirm-yes").textContent = "Delete all";
      document.getElementById("confirm-yes").className = "confirm-button danger";
      document.getElementById("confirm-panel").hidden = false;
    }

    function confirmSelectedDevice(action) {
      if (selectedDevice) {
        confirmAction(action, selectedDevice);
      }
    }

    function selectDevice(deviceName) {
      if (deviceName) {
        selectedDevice = deviceName;
        syncSelectedDeviceControls();
      }
    }

    function syncSelectedDeviceControls() {
      const selectedLabel = document.getElementById("selected-device-label");
      const deviceSelect = document.getElementById("device-select");
      const addButton = document.getElementById("add-selected-button");
      const deleteButton = document.getElementById("delete-selected-button");

      selectedLabel.textContent = selectedDevice || "";
      addButton.disabled = !selectedDevice;
      deleteButton.disabled = !selectedDevice;

      for (const button of document.querySelectorAll("[data-device-name]")) {
        const isSelected = button.dataset.deviceName === selectedDevice;
        const isInstalled = ACTIVE_DEVICES.has(button.dataset.deviceName);
        button.className = [
          "device-button",
          isSelected ? "selected" : "",
          isInstalled ? "installed" : "",
        ].filter(Boolean).join(" ");
        button.setAttribute("aria-pressed", String(isSelected));
      }

      if (DROPDOWN_DEVICES.includes(selectedDevice)) {
        deviceSelect.value = selectedDevice;
      }
    }

    function getTrackScopeCopy() {
      if (selectedTrackScope === "selected") {
        return SELECTED_TRACK_COUNT === 1 ? "the selected track" : "selected tracks";
      }

      return "every track";
    }

    function syncTrackScopeButtons() {
      for (const button of document.querySelectorAll("[data-track-scope]")) {
        const isActive = button.dataset.trackScope === selectedTrackScope;
        button.className = isActive ? "placement-button active" : "placement-button";
        button.setAttribute("aria-pressed", String(isActive));
      }

      const selectedScopeButton = document.querySelector("[data-track-scope='selected']");
      selectedScopeButton.disabled = SELECTED_TRACK_COUNT === 0;
      selectedScopeButton.title = SELECTED_TRACK_COUNT === 0
        ? "Open Repeat It from a track to use selected tracks"
        : "";
    }

    function cancelPendingAction() {
      pendingAction = null;
      document.getElementById("confirm-panel").hidden = true;
    }

    function runPendingAction() {
      if (!pendingAction) {
        return;
      }

      if (pendingAction.action === "removeAll" && !pendingAction.confirmed) {
        pendingAction.confirmed = true;
        document.getElementById("confirm-title").textContent = "ARE YOU SURE?";
        document.getElementById("confirm-copy").textContent =
          `This action will remove every supported Ableton audio effect from ${getTrackScopeCopy()}. This cannot be undone.`;
        document.getElementById("confirm-yes").textContent = "Yes, delete all";
        return;
      }

      closeWithResult(pendingAction);
    }

    function openLatestRelease() {
      closeWithResult({
        action: "openUrl",
        url: latestReleaseUrl || RELEASES_URL,
      });
    }

    function normalizeVersion(version) {
      return String(version)
        .trim()
        .replace(/^v/i, "")
        .split(/[+-]/)[0]
        .split(".")
        .map((part) => Number.parseInt(part, 10) || 0);
    }

    function compareVersions(currentVersion, latestVersion) {
      const currentParts = normalizeVersion(currentVersion);
      const latestParts = normalizeVersion(latestVersion);
      const length = Math.max(currentParts.length, latestParts.length);

      for (let index = 0; index < length; index += 1) {
        const currentPart = currentParts[index] || 0;
        const latestPart = latestParts[index] || 0;

        if (latestPart > currentPart) return 1;
        if (latestPart < currentPart) return -1;
      }

      return 0;
    }

    async function checkForUpdates(options = {}) {
      const silent = options.silent === true;
      const status = document.getElementById("update-status");
      const button = document.getElementById("update-button");

      if (!UPDATE_CHECK_URL) {
        if (!silent) {
          status.textContent = "Update checks are not configured yet.";
        }
        return;
      }

      if (!silent) {
        status.textContent = "Checking...";
        status.className = "update-status";
        button.disabled = true;
      }

      try {
        const response = await fetch(UPDATE_CHECK_URL, {
          headers: { "Accept": "application/vnd.github+json" },
        });

        if (!response.ok) {
          throw new Error(`GitHub returned ${response.status}`);
        }

        const release = await response.json();
        const latestVersion = release.tag_name || release.name;

        if (!latestVersion) {
          throw new Error("No version was found in the latest release.");
        }

        const comparison = compareVersions(VERSION, latestVersion);

        if (comparison > 0) {
          latestReleaseUrl = release.html_url || RELEASES_URL;
          status.className = "update-status update-status-available";
          status.innerHTML = `Update available: ${latestVersion} <button class="status-link" type="button" onclick="openLatestRelease()">Open in browser</button>`;
          if (release.html_url) {
            latestReleaseUrl = release.html_url;
          }
        } else if (comparison < 0) {
          if (!silent) {
            status.className = "update-status";
            status.textContent = `Installed ${VERSION} is newer than GitHub ${latestVersion}.`;
          }
        } else {
          if (!silent) {
            status.className = "update-status";
            status.textContent = `You are up to date (${VERSION}).`;
          }
        }
      } catch (error) {
        if (!silent) {
          status.className = "update-status";
          status.textContent = "Could not check for updates.";
        }
        console.error("Repeat It update check failed.", error);
      } finally {
        if (!silent) {
          button.disabled = false;
        }
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.getElementById("device-list");
      const deviceSelect = document.getElementById("device-select");
      const insertPositionButtons = document.querySelectorAll("[data-insert-position]");
      const trackScopeButtons = document.querySelectorAll("[data-track-scope]");
      const darkModeToggle = document.getElementById("dark-mode-toggle");
      const tooltipsToggle = document.getElementById("tooltips-toggle");
      document.getElementById("version").textContent = `v${VERSION}`;
      darkModeToggle.checked = isDarkModeEnabled;
      tooltipsToggle.checked = areTooltipsEnabled;
      applyOptions();
      if (AUTO_UPDATE_CHECK) {
        void checkForUpdates({ silent: true });
      }

      function syncInsertPositionButtons() {
        for (const button of insertPositionButtons) {
          const isActive = button.dataset.insertPosition === selectedInsertPosition;
          button.className = isActive ? "placement-button active" : "placement-button";
          button.setAttribute("aria-pressed", String(isActive));
        }
      }

      for (const deviceName of QUICK_DEVICES) {
        const button = document.createElement("button");
        button.className = "device-button";
        button.type = "button";
        button.dataset.deviceName = deviceName;
        button.textContent = deviceName;
        button.setAttribute("aria-pressed", "false");
        button.addEventListener("click", () => selectDevice(deviceName));
        grid.appendChild(button);
      }

      const orderedDropdownDevices = [
        ...DROPDOWN_DEVICES.filter((deviceName) => !UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)),
        ...DROPDOWN_DEVICES.filter((deviceName) => UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)),
      ];

      for (const deviceName of orderedDropdownDevices) {
        const option = document.createElement("option");
        option.value = deviceName;
        option.textContent = UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)
          ? `${deviceName} (M4L not supported)`
          : deviceName;
        if (UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)) {
          option.disabled = true;
        }
        deviceSelect.appendChild(option);
      }

      if (DROPDOWN_DEVICES.includes(SELECTED_DROPDOWN_DEVICE)) {
        deviceSelect.value = SELECTED_DROPDOWN_DEVICE;
      }

      syncInsertPositionButtons();
      syncTrackScopeButtons();
      syncSelectedDeviceControls();
      deviceSelect.addEventListener("change", () => selectDevice(deviceSelect.value));

      for (const button of trackScopeButtons) {
        button.addEventListener("click", () => {
          selectedTrackScope = button.dataset.trackScope === "selected" && SELECTED_TRACK_COUNT > 0
            ? "selected"
            : "all";
          syncTrackScopeButtons();
        });
      }

      for (const button of insertPositionButtons) {
        button.addEventListener("click", () => {
          selectedInsertPosition = button.dataset.insertPosition === "start" ? "start" : "end";
          syncInsertPositionButtons();
        });
      }

      darkModeToggle.addEventListener("change", () => {
        isDarkModeEnabled = darkModeToggle.checked;
        applyOptions();
      });

      tooltipsToggle.addEventListener("change", () => {
        areTooltipsEnabled = tooltipsToggle.checked;
        applyOptions();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (pendingAction) {
            cancelPendingAction();
          } else if (isOptionsOpen) {
            closeOptions();
          } else {
            closeRepeatIt();
          }
        }
      });
    });
  </script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    :root {
      --live-bg: hsl(0, 0%, 21%);
      --live-panel: hsl(0, 0%, 26%);
      --live-control: hsl(0, 0%, 16%);
      --live-control-hover: hsl(0, 0%, 30%);
      --live-input: hsl(0, 0%, 12%);
      --live-border: hsl(0, 0%, 7%);
      --live-text: hsl(0, 0%, 83%);
      --live-muted: hsl(0, 0%, 58%);
      --live-accent: hsl(31, 100%, 58%);
      --live-accent-pressed: hsl(31, 100%, 67%);
      --live-active: hsl(111, 53%, 66%);
      --live-active-hover: hsl(111, 45%, 58%);
      --live-active-text: hsl(120, 18%, 10%);
      --live-danger: hsl(0, 72%, 48%);
      --live-danger-hover: hsl(0, 67%, 39%);
      --repeat-teal: hsl(184, 85%, 39%);
      --repeat-teal-hover: hsl(184, 86%, 45%);
    }

    html {
      height: 100%;
      background: var(--live-bg);
      color: var(--live-text);
      font-family: "AbletonSansSmall", Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      -webkit-font-smoothing: antialiased;
    }

    body {
      height: 100%;
      overflow: hidden;
      padding: 14px;
      background: var(--live-bg);
    }

    body.light-mode {
      --live-bg: hsl(0, 0%, 96%);
      --live-panel: hsl(0, 0%, 90%);
      --live-control: hsl(0, 0%, 84%);
      --live-control-hover: hsl(0, 0%, 76%);
      --live-input: hsl(0, 0%, 100%);
      --live-border: hsl(0, 0%, 38%);
      --live-text: hsl(0, 0%, 12%);
      --live-muted: hsl(0, 0%, 35%);
      --live-active-text: hsl(0, 0%, 100%);
    }

    body.options-open .workbench,
    body.options-open .bottom-actions {
      display: none;
    }

    .shell {
      display: flex;
      min-height: calc(100vh - 28px);
      flex-direction: column;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--live-border);
      padding-bottom: 8px;
    }

    h1 {
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
    }

    .brand-logo {
      display: block;
      width: 110px;
      height: 40px;
      flex: 0 0 110px;
      overflow: visible;
    }

    .brand-logo svg {
      display: block;
      width: 102px;
      height: 40px;
      overflow: visible;
    }

    .version {
      color: var(--live-muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .description {
      color: var(--live-muted);
      font-size: 11px;
      line-height: 1.3;
      font-weight: 600;
    }

    .placement-panel {
      display: grid;
      gap: 6px;
    }

    .placement-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .placement-button {
      position: relative;
      min-height: 24px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      line-height: 1.2;
      padding: 0 10px;
      text-align: center;
    }

    .placement-button:hover {
      background: var(--live-control-hover);
    }

    .placement-button.active {
      background: var(--repeat-teal);
      color: var(--live-input);
    }

    .placement-button:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .placement-button:disabled:hover {
      background: var(--live-control);
    }

    body.tooltips-enabled .placement-button[data-tooltip]::after,
    body.tooltips-enabled .dropdown-action[data-tooltip]::after,
    body.tooltips-enabled .remove-button[data-tooltip]::after,
    body.tooltips-enabled .update-button[data-tooltip]::after,
    body.tooltips-enabled .options-button[data-tooltip]::after,
    body.tooltips-enabled .close-button[data-tooltip]::after {
      position: fixed;
      z-index: 5;
      top: 10px;
      right: 18px;
      width: 210px;
      max-width: calc(100vw - 36px);
      border: 1px solid var(--live-accent-pressed);
      background: var(--live-input);
      color: var(--live-text);
      box-shadow: 0 0 8px hsla(31, 100%, 67%, 0.38);
      content: attr(data-tooltip);
      font-size: 10.5px;
      line-height: 1.25;
      opacity: 0;
      padding: 5px 7px;
      pointer-events: none;
      text-align: left;
      white-space: normal;
    }

    body.tooltips-enabled .placement-button[data-tooltip]:hover::after,
    body.tooltips-enabled .placement-button[data-tooltip]:focus::after,
    body.tooltips-enabled .dropdown-action[data-tooltip]:hover::after,
    body.tooltips-enabled .dropdown-action[data-tooltip]:focus::after,
    body.tooltips-enabled .remove-button[data-tooltip]:hover::after,
    body.tooltips-enabled .remove-button[data-tooltip]:focus::after,
    body.tooltips-enabled .update-button[data-tooltip]:hover::after,
    body.tooltips-enabled .update-button[data-tooltip]:focus::after,
    body.tooltips-enabled .options-button[data-tooltip]:hover::after,
    body.tooltips-enabled .options-button[data-tooltip]:focus::after,
    body.tooltips-enabled .close-button[data-tooltip]:hover::after,
    body.tooltips-enabled .close-button[data-tooltip]:focus::after {
      opacity: 1;
    }

    .placement-button:focus {
      outline: 2px solid var(--live-accent-pressed);
      outline-offset: 1px;
    }

    .section-title {
      color: var(--live-muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .workbench {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 12px;
      padding: 0;
    }

    .common-panel,
    .controls-panel {
      display: grid;
      align-content: start;
      gap: 6px;
      min-width: 0;
    }

    .device-list {
      display: grid;
      gap: 4px;
    }

    .device-button,
    .dropdown-action,
    .cancel-button {
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      line-height: 1.2;
      padding: 0 10px;
      text-align: left;
    }

    .device-button:hover,
    .dropdown-action:hover,
    .cancel-button:hover {
      background: var(--live-control-hover);
    }

    .device-button {
      min-height: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .device-button:active {
      background: var(--repeat-teal);
      color: var(--live-input);
    }

    .device-button.installed {
      border-left: 4px solid var(--live-active);
    }

    .device-button.selected {
      background: var(--repeat-teal);
      color: var(--live-input);
    }

    .dropdown-panel {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .device-select {
      width: 100%;
      min-height: 24px;
      border: 1px solid var(--live-border);
      background: var(--live-input);
      color: var(--live-text);
      font: inherit;
      padding: 0 8px;
    }

    .dropdown-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .danger-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 6px;
      row-gap: 8px;
    }

    .danger-actions::before {
      content: "";
      grid-column: 2;
      border-top: 1px solid var(--live-border);
    }

    .dropdown-action {
      min-height: 34px;
      background: hsl(0, 0%, 84%);
      color: var(--live-input);
      font-size: 13px;
      text-align: center;
    }

    .dropdown-action:hover {
      border-color: var(--live-active);
      background: hsl(111, 53%, 86%);
      color: var(--live-input);
      box-shadow: 0 0 8px hsla(111, 53%, 66%, 0.72);
    }

    .action-panel {
      display: grid;
      gap: 6px;
      border-top: 1px solid var(--live-border);
      padding-top: 8px;
    }

    .selected-device-title {
      color: var(--repeat-teal);
      font-size: 14px;
      letter-spacing: 0.02em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .selected-device-label {
      min-height: 32px;
      border: 1px solid var(--live-border);
      border-left: 4px solid var(--live-active);
      background: var(--live-input);
      color: var(--live-active);
      font-size: 18px;
      line-height: 1.2;
      padding: 5px 10px;
      text-transform: uppercase;
    }

    .dropdown-action.delete:hover {
      border-color: var(--live-border);
      background: var(--live-danger-hover);
      color: var(--live-text);
      box-shadow: none;
    }

    .dropdown-action.delete:active {
      background: var(--live-danger);
      color: var(--live-text);
    }

    .device-select option:disabled {
      color: var(--live-muted);
    }

    .remove-button {
      position: relative;
      grid-column: 2;
      height: 24px;
      align-self: start;
      border: 1px solid var(--live-border);
      background: var(--live-danger);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
    }

    .remove-button:hover {
      background: var(--live-danger-hover);
    }

    .device-button:focus,
    .dropdown-action:focus,
    .device-select:focus,
    .cancel-button:focus,
    .placement-button:focus {
      outline: 2px solid var(--live-accent-pressed);
      outline-offset: 1px;
    }

    .close-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
      align-self: start;
    }

    .update {
      display: flex;
      min-width: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      border-top: 1px solid var(--live-border);
      padding-top: 8px;
    }

    .update-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
      text-align: center;
    }

    .update-button:hover {
      background: var(--live-control-hover);
    }

    .update-button:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .update-status {
      min-height: 14px;
      color: var(--live-muted);
      font-size: 10.5px;
      line-height: 1.25;
      text-align: left;
    }

    .update-status-available {
      color: var(--live-active);
      text-shadow: 0 0 7px hsla(111, 53%, 66%, 0.78);
    }

    .status-link {
      border: 0;
      background: transparent;
      color: var(--live-accent-pressed);
      cursor: pointer;
      font: inherit;
      padding: 0;
      text-decoration: underline;
    }

    .cancel-button {
      min-height: 28px;
      text-align: center;
    }

    .options-button {
      width: 34px;
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      font-size: 17px;
      line-height: 1;
      padding: 0;
      text-align: center;
    }

    .options-button:hover {
      background: var(--live-control-hover);
    }

    .options-page {
      display: none;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      padding-top: 2px;
    }

    body.options-open .options-page {
      display: flex;
    }

    .options-title {
      color: var(--repeat-teal);
      font-size: 14px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .option-check {
      display: flex;
      min-height: 34px;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      padding: 0 10px;
    }

    .option-check input {
      width: 14px;
      height: 14px;
      accent-color: var(--repeat-teal);
    }

    .close-options-button {
      min-height: 28px;
      width: 150px;
      align-self: end;
      margin-top: auto;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
      text-align: center;
    }

    .close-options-button:hover {
      background: var(--live-control-hover);
    }

    .bottom-actions {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 12px;
      margin-top: auto;
    }

    .bottom-actions .close-button {
      justify-self: end;
    }

    .close-panel {
      position: fixed;
      right: 14px;
      bottom: 14px;
    }

    .close-stack {
      display: grid;
      grid-template-columns: auto auto;
      gap: 6px;
      border-top: 1px solid var(--live-border);
      padding-top: 8px;
    }

    .confirm-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: hsla(0, 0%, 8%, 0.72);
      padding: 18px;
    }

    .confirm-panel[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(100%, 300px);
      border: 1px solid var(--live-border);
      background: var(--live-panel);
      padding: 14px;
    }

    .confirm-box h2 {
      font-size: 15px;
      letter-spacing: 0;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .confirm-box p {
      color: var(--live-muted);
      font-size: 11.5px;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .confirm-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-accent);
      color: var(--live-input);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
    }

    .confirm-button.secondary {
      background: var(--live-control);
      color: var(--live-text);
    }

    .confirm-button.danger {
      background: var(--live-danger);
      color: var(--live-text);
    }
  </style>
</head>

<body>
  <main class="shell">
    <header class="header">
      <div class="title-group">
        <div class="brand-row">
          <div class="brand-logo" aria-label="Repeat It" role="img">__REPEAT_IT_LOGO_MARKUP__</div>
          <div class="version" id="version"></div>
        </div>
        <p class="description">Add or remove Live audio effects across tracks at once.</p>
      </div>
    </header>

    <section class="workbench">
      <section class="common-panel" aria-label="Common devices">
        <div class="section-title">Common effects/tools</div>
        <section class="device-list" id="device-list" aria-label="Devices"></section>
        <section class="dropdown-panel" aria-label="More devices">
          <div class="section-title">More effects/tools</div>
          <select class="device-select" id="device-select"></select>
        </section>
        </section>

      <section class="controls-panel" aria-label="Device controls">
        <section class="placement-panel" aria-label="Track scope">
          <div class="section-title">Apply to</div>
          <div class="placement-toggle">
            <button class="placement-button" type="button" data-track-scope="all" data-tooltip="All tracks applies everywhere." aria-pressed="false">All tracks</button>
            <button class="placement-button" type="button" data-track-scope="selected" data-tooltip="Selected tracks uses tracks selected before opening." aria-pressed="false">Selected tracks</button>
          </div>
        </section>

        <section class="placement-panel" aria-label="Insert position">
          <div class="section-title">Insert position</div>
          <div class="placement-toggle">
            <button class="placement-button" type="button" data-insert-position="start" data-tooltip="Start inserts plugin at start of chain." aria-pressed="false">Start</button>
            <button class="placement-button" type="button" data-insert-position="end" data-tooltip="End inserts plugin at end of chain." aria-pressed="false">End</button>
          </div>
        </section>

        <section class="action-panel" aria-label="Selected device actions">
          <div class="selected-device-title">Selected device</div>
          <div class="selected-device-label" id="selected-device-label"></div>
        </section>

        <div class="dropdown-actions">
          <button class="dropdown-action" id="add-selected-button" type="button" data-tooltip="Adds the selected device using the current Apply to and Insert position choices." onclick="confirmSelectedDevice('add')">Add</button>
          <button class="dropdown-action delete" id="delete-selected-button" type="button" data-tooltip="Removes every matching selected device using the current Apply to choice." onclick="confirmSelectedDevice('delete')">Remove</button>
        </div>
        <div class="danger-actions">
          <button class="remove-button" type="button" data-tooltip="Removes every supported Ableton FX device using the current Apply to choice." onclick="confirmRemoveAllAbletonFX()">Remove all Ableton FX</button>
        </div>
      </section>
    </section>
    <section class="options-page" aria-label="Options">
      <div class="options-title">Options</div>
      <div class="options-row">
        <label class="option-check">
          <input id="dark-mode-toggle" type="checkbox">
          <span>Dark mode / Light mode</span>
        </label>
        <label class="option-check">
          <input id="tooltips-toggle" type="checkbox">
          <span>Enable tooltips</span>
        </label>
      </div>
      <button class="close-options-button" type="button" onclick="closeOptions()">Close options</button>
    </section>
    <section class="bottom-actions" aria-label="Window actions">
      <div class="update">
        <button class="update-button" id="update-button" type="button" data-tooltip="Checks GitHub for the latest Repeat It release." onclick="checkForUpdates()">Check for updates</button>
        <div class="update-status" id="update-status"></div>
      </div>
      <div class="close-panel">
        <div class="close-stack">
          <button class="options-button" type="button" data-tooltip="Opens Repeat It options." onclick="openOptions()" aria-label="Options">&#9881;</button>
          <button class="close-button cancel-button" type="button" data-tooltip="Closes Repeat It and remembers your current choices." onclick="closeRepeatIt()">CLOSE</button>
        </div>
      </div>
    </section>
    <section class="confirm-panel" id="confirm-panel" hidden>
      <div class="confirm-box">
        <h2 id="confirm-title"></h2>
        <p id="confirm-copy"></p>
        <div class="confirm-actions">
          <button class="confirm-button secondary" type="button" onclick="cancelPendingAction()">Cancel</button>
          <button class="confirm-button" id="confirm-yes" type="button" onclick="runPendingAction()">Confirm</button>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
