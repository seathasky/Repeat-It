<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repeat It</title>
  <script>
    const QUICK_DEVICES = __REPEAT_IT_QUICK_DEVICE_NAMES__;
    const DROPDOWN_DEVICES = __REPEAT_IT_DROPDOWN_DEVICE_NAMES__;
    const SELECTED_DROPDOWN_DEVICE = __REPEAT_IT_SELECTED_DROPDOWN_DEVICE__;
    const ACTIVE_DEVICES = new Set(__REPEAT_IT_ACTIVE_DEVICE_NAMES__);
    const VERSION = __REPEAT_IT_VERSION__;
    const UPDATE_CHECK_URL = __REPEAT_IT_UPDATE_CHECK_URL__;
    const RELEASES_URL = __REPEAT_IT_RELEASES_URL__;

    const isWebKitMessageHandlerAvailable = window.webkit &&
      window.webkit.messageHandlers &&
      window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;

    function sendMessage(message) {
      if (isWebKitMessageHandlerAvailable) {
        window.webkit.messageHandlers.live.postMessage(message);
      } else if (isWebView2) {
        window.chrome.webview.postMessage(message);
      }
    }

    function closeWithResult(result) {
      sendMessage({
        method: "close_and_send",
        params: [JSON.stringify(result)],
      });
    }

    let latestReleaseUrl = RELEASES_URL;
    let pendingAction = null;

    const UNSUPPORTED_DROPDOWN_DEVICES = new Set([
      "Align Delay",
      "Shaper",
      "LFO",
      "Envelope Follower",
    ]);

    function confirmAction(action, deviceName) {
      pendingAction = { action, deviceName };

      document.getElementById("confirm-title").textContent = action === "add"
        ? `Add ${deviceName}?`
        : `Delete all ${deviceName}?`;
      document.getElementById("confirm-copy").textContent = action === "add"
        ? `This will add ${deviceName} to every track.`
        : `This will delete every ${deviceName} from every track.`;
      document.getElementById("confirm-yes").textContent = action === "add"
        ? "Add to all"
        : "Delete all";
      document.getElementById("confirm-yes").className = action === "add"
        ? "confirm-button"
        : "confirm-button danger";
      document.getElementById("confirm-panel").hidden = false;
    }

    function confirmRemoveAllAbletonFX() {
      pendingAction = { action: "removeAll", confirmed: false };
      document.getElementById("confirm-title").textContent = "REMOVE ALL ABLETON FX?";
      document.getElementById("confirm-copy").textContent =
        "This will delete every supported Ableton audio effect from every track.";
      document.getElementById("confirm-yes").textContent = "Delete all";
      document.getElementById("confirm-yes").className = "confirm-button danger";
      document.getElementById("confirm-panel").hidden = false;
    }

    function confirmSelectedDevice(action) {
      const deviceName = document.getElementById("device-select").value;

      if (deviceName) {
        confirmAction(action, deviceName);
      }
    }

    function cancelPendingAction() {
      pendingAction = null;
      document.getElementById("confirm-panel").hidden = true;
    }

    function runPendingAction() {
      if (!pendingAction) {
        return;
      }

      if (pendingAction.action === "removeAll" && !pendingAction.confirmed) {
        pendingAction.confirmed = true;
        document.getElementById("confirm-title").textContent = "ARE YOU SURE?";
        document.getElementById("confirm-copy").textContent =
          "This action will remove every supported Ableton audio effect from every track. This cannot be undone.";
        document.getElementById("confirm-yes").textContent = "Yes, delete all";
        return;
      }

      closeWithResult(pendingAction);
    }

    function openLatestRelease() {
      closeWithResult({
        action: "openUrl",
        url: latestReleaseUrl || RELEASES_URL,
      });
    }

    function normalizeVersion(version) {
      return String(version)
        .trim()
        .replace(/^v/i, "")
        .split(/[+-]/)[0]
        .split(".")
        .map((part) => Number.parseInt(part, 10) || 0);
    }

    function compareVersions(currentVersion, latestVersion) {
      const currentParts = normalizeVersion(currentVersion);
      const latestParts = normalizeVersion(latestVersion);
      const length = Math.max(currentParts.length, latestParts.length);

      for (let index = 0; index < length; index += 1) {
        const currentPart = currentParts[index] || 0;
        const latestPart = latestParts[index] || 0;

        if (latestPart > currentPart) return 1;
        if (latestPart < currentPart) return -1;
      }

      return 0;
    }

    async function checkForUpdates() {
      const status = document.getElementById("update-status");
      const button = document.getElementById("update-button");

      if (!UPDATE_CHECK_URL) {
        status.textContent = "Update checks are not configured yet.";
        return;
      }

      status.textContent = "Checking...";
      button.disabled = true;

      try {
        const response = await fetch(UPDATE_CHECK_URL, {
          headers: { "Accept": "application/vnd.github+json" },
        });

        if (!response.ok) {
          throw new Error(`GitHub returned ${response.status}`);
        }

        const release = await response.json();
        const latestVersion = release.tag_name || release.name;

        if (!latestVersion) {
          throw new Error("No version was found in the latest release.");
        }

        const comparison = compareVersions(VERSION, latestVersion);

        if (comparison > 0) {
          latestReleaseUrl = release.html_url || RELEASES_URL;
          status.innerHTML = `Update available: ${latestVersion} <button class="status-link" type="button" onclick="openLatestRelease()">Open in browser</button>`;
          if (release.html_url) {
            latestReleaseUrl = release.html_url;
          }
        } else if (comparison < 0) {
          status.textContent = `Installed ${VERSION} is newer than GitHub ${latestVersion}.`;
        } else {
          status.textContent = `You are up to date (${VERSION}).`;
        }
      } catch (error) {
        status.textContent = "Could not check for updates.";
        console.error("Repeat It update check failed.", error);
      } finally {
        button.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.getElementById("device-grid");
      const deviceSelect = document.getElementById("device-select");
      document.getElementById("version").textContent = `v${VERSION}`;

      for (const deviceName of QUICK_DEVICES) {
        const tile = document.createElement("div");
        tile.className = "device-tile";

        const addButton = document.createElement("button");
        addButton.className = ACTIVE_DEVICES.has(deviceName)
          ? "device-button active"
          : "device-button";
        addButton.type = "button";
        addButton.textContent = deviceName;
        addButton.addEventListener("click", () => confirmAction("add", deviceName));

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-button";
        deleteButton.type = "button";
        deleteButton.textContent = "Delete all";
        deleteButton.addEventListener("click", () => confirmAction("delete", deviceName));

        tile.append(addButton, deleteButton);
        grid.appendChild(tile);
      }

      const orderedDropdownDevices = [
        ...DROPDOWN_DEVICES.filter((deviceName) => !UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)),
        ...DROPDOWN_DEVICES.filter((deviceName) => UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)),
      ];

      for (const deviceName of orderedDropdownDevices) {
        const option = document.createElement("option");
        option.value = deviceName;
        option.textContent = UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)
          ? `${deviceName} (M4L not supported)`
          : deviceName;
        if (UNSUPPORTED_DROPDOWN_DEVICES.has(deviceName)) {
          option.disabled = true;
        }
        deviceSelect.appendChild(option);
      }

      if (DROPDOWN_DEVICES.includes(SELECTED_DROPDOWN_DEVICE)) {
        deviceSelect.value = SELECTED_DROPDOWN_DEVICE;
      }

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (pendingAction) {
            cancelPendingAction();
          } else {
            closeWithResult({ action: "close" });
          }
        }
      });
    });
  </script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    :root {
      --live-bg: hsl(0, 0%, 21%);
      --live-panel: hsl(0, 0%, 26%);
      --live-control: hsl(0, 0%, 16%);
      --live-control-hover: hsl(0, 0%, 30%);
      --live-input: hsl(0, 0%, 12%);
      --live-border: hsl(0, 0%, 7%);
      --live-text: hsl(0, 0%, 83%);
      --live-muted: hsl(0, 0%, 58%);
      --live-accent: hsl(31, 100%, 58%);
      --live-accent-pressed: hsl(31, 100%, 67%);
      --live-active: hsl(111, 53%, 66%);
      --live-active-hover: hsl(111, 45%, 58%);
      --live-active-text: hsl(120, 18%, 10%);
      --live-danger: hsl(0, 72%, 48%);
      --live-danger-hover: hsl(0, 67%, 39%);
    }

    html {
      height: 100%;
      background: var(--live-bg);
      color: var(--live-text);
      font-family: "AbletonSansSmall", Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      -webkit-font-smoothing: antialiased;
    }

    body {
      height: 100%;
      overflow: hidden;
      padding: 14px;
      background: var(--live-bg);
    }

    .shell {
      display: flex;
      min-height: calc(100vh - 28px);
      flex-direction: column;
      gap: 9px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--live-border);
      padding-bottom: 8px;
    }

    h1 {
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .title-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .version {
      color: var(--live-muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .description {
      color: var(--live-muted);
      font-size: 11px;
      line-height: 1.3;
      font-weight: 600;
    }

    .section-title {
      color: var(--live-muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .device-tile {
      display: grid;
      grid-template-rows: 34px 18px;
      min-width: 0;
    }

    .device-button,
    .delete-button,
    .dropdown-action,
    .cancel-button {
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      line-height: 1.2;
      padding: 0 10px;
      text-align: left;
    }

    .device-button:hover,
    .delete-button:hover,
    .dropdown-action:hover,
    .cancel-button:hover {
      background: var(--live-control-hover);
    }

    .device-button:active {
      background: var(--live-accent);
      color: var(--live-input);
    }

    .device-button.active {
      background: var(--live-active);
      color: var(--live-active-text);
    }

    .device-button.active:hover {
      background: var(--live-active-hover);
      color: var(--live-active-text);
    }

    .delete-button {
      min-height: 18px;
      border-top: 0;
      background: var(--live-input);
      color: var(--live-muted);
      font-size: 10px;
      text-align: center;
    }

    .delete-button:hover {
      background: var(--live-danger-hover);
      color: var(--live-text);
    }

    .delete-button:active {
      background: var(--live-danger);
      color: var(--live-text);
    }

    .dropdown-panel {
      display: grid;
      gap: 6px;
      border-top: 1px solid var(--live-border);
      padding-top: 9px;
    }

    .device-select {
      width: 100%;
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-input);
      color: var(--live-text);
      font: inherit;
      padding: 0 8px;
    }

    .dropdown-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .dropdown-action {
      min-height: 28px;
      text-align: center;
    }

    .dropdown-action.delete:hover {
      background: var(--live-danger-hover);
      color: var(--live-text);
    }

    .dropdown-action.delete:active {
      background: var(--live-danger);
      color: var(--live-text);
    }

    .device-select option:disabled {
      color: var(--live-muted);
    }

    .remove-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-danger);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
    }

    .remove-button:hover {
      background: var(--live-danger-hover);
    }

    .device-button:focus,
    .delete-button:focus,
    .dropdown-action:focus,
    .device-select:focus,
    .cancel-button:focus {
      outline: 2px solid var(--live-accent-pressed);
      outline-offset: 1px;
    }

    .footer {
      display: flex;
      margin-top: auto;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 12px;
      border-top: 1px solid var(--live-border);
      padding-top: 8px;
    }

    .close-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
      align-self: start;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--live-border);
      padding-bottom: 8px;
    }

    .update {
      display: flex;
      flex: 1;
      min-width: 0;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .update-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-control);
      color: var(--live-text);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
      text-align: center;
    }

    .update-button:hover {
      background: var(--live-control-hover);
    }

    .update-button:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .update-status {
      min-height: 14px;
      color: var(--live-muted);
      font-size: 10.5px;
      line-height: 1.25;
    }

    .status-link {
      border: 0;
      background: transparent;
      color: var(--live-accent-pressed);
      cursor: pointer;
      font: inherit;
      padding: 0;
      text-decoration: underline;
    }

    .cancel-button {
      min-height: 28px;
      text-align: center;
    }

    .confirm-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: hsla(0, 0%, 8%, 0.72);
      padding: 18px;
    }

    .confirm-panel[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(100%, 300px);
      border: 1px solid var(--live-border);
      background: var(--live-panel);
      padding: 14px;
    }

    .confirm-box h2 {
      font-size: 15px;
      letter-spacing: 0;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .confirm-box p {
      color: var(--live-muted);
      font-size: 11.5px;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .confirm-button {
      min-height: 28px;
      border: 1px solid var(--live-border);
      background: var(--live-accent);
      color: var(--live-input);
      cursor: pointer;
      font: inherit;
      padding: 0 12px;
    }

    .confirm-button.secondary {
      background: var(--live-control);
      color: var(--live-text);
    }

    .confirm-button.danger {
      background: var(--live-danger);
      color: var(--live-text);
    }
  </style>
</head>

<body>
  <main class="shell">
    <header class="header">
      <div class="title-group">
        <div class="title-line">
          <h1>Repeat It</h1>
          <div class="version" id="version"></div>
        </div>
        <p class="description">Add or remove Live audio effects across every track at once.</p>
      </div>
      <button class="close-button cancel-button" type="button" onclick="closeWithResult({ action: 'close' })">Close</button>
    </header>

    <div class="section-title">Common effects/tools</div>
    <section class="device-grid" id="device-grid" aria-label="Devices"></section>

    <section class="dropdown-panel" aria-label="More devices">
      <div class="section-title">More effects/tools</div>
      <select class="device-select" id="device-select"></select>
      <div class="dropdown-actions">
        <button class="dropdown-action" type="button" onclick="confirmSelectedDevice('add')">Add selected</button>
        <button class="dropdown-action delete" type="button" onclick="confirmSelectedDevice('delete')">Delete selected</button>
      </div>
    </section>

    <footer class="footer">
      <div class="update">
        <button class="update-button" id="update-button" type="button" onclick="checkForUpdates()">Check for updates</button>
        <div class="update-status" id="update-status"></div>
      </div>
      <button class="remove-button" type="button" onclick="confirmRemoveAllAbletonFX()">Remove all ableton fx</button>
    </footer>
    <section class="confirm-panel" id="confirm-panel" hidden>
      <div class="confirm-box">
        <h2 id="confirm-title"></h2>
        <p id="confirm-copy"></p>
        <div class="confirm-actions">
          <button class="confirm-button secondary" type="button" onclick="cancelPendingAction()">Cancel</button>
          <button class="confirm-button" id="confirm-yes" type="button" onclick="runPendingAction()">Confirm</button>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
